<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Privacy Notice - marycielo.mx</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #dd5903;
      --secondary: #033a58;
      --card: rgba(255, 255, 255, 0.92);
      --text: #163042;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Jost", sans-serif;
      color: var(--text);
      background:
        linear-gradient(rgba(3, 58, 88, 0.42), rgba(3, 58, 88, 0.72)),
        url("../../wp-content/uploads/2023/03/marycielo_home_08.jpg") center / cover no-repeat;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      width: min(680px, 100%);
      background: var(--card);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(10px);
    }
    img {
      display: block;
      width: 120px;
      margin: 0 auto 20px;
    }
    h1 {
      margin: 0 0 12px;
      font-family: "Cinzel", serif;
      color: var(--secondary);
      font-size: clamp(2rem, 4vw, 2.8rem);
      text-align: center;
    }
    p {
      margin: 0 0 14px;
      font-size: 1.05rem;
      line-height: 1.7;
      text-align: center;
    }
    .actions {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 28px;
    }
    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 170px;
      padding: 14px 20px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }
    a.button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }
    a.button.primary {
      background: var(--primary);
      color: #fff;
    }
    a.button.secondary {
      background: transparent;
      color: var(--secondary);
      border: 1px solid rgba(3, 58, 88, 0.2);
    }
  </style>
</head>
<body>
  <main>
    <a href="../../index.html">
      <img src="../../wp-content/uploads/2023/03/Logo-Mar-y-Cielo-2023-500x500-1.png" alt="Mar y Cielo">
    </a>
    <h1>Privacy Notice</h1>
    <p>This local clone includes the home page and the menu/contact sections recovered from the live site.</p>
    <p>The original privacy notice could not be archived because `marycielo.mx` was returning a WordPress critical error on that route during the clone.</p>
    <div class="actions">
      <a class="button primary" href="../../index.html">Back to Home</a>
      <a class="button secondary" href="../../index.html#colophon">Contact Details</a>
    </div>
  </main>
</body>
</html>
